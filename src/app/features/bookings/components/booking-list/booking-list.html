<section class="booking-list" aria-labelledby="booking-list-title">
  <div class="booking-list__header">
    <h2 id="booking-list-title">Clases disponibles</h2>
    <p>Elegí una clase y revisá los detalles antes de reservar.</p>
  </div>

  <div class="booking-list__grid">
    @for (booking of bookings(); track booking.id) {
      <app-booking-card [booking]="booking" />
    } @empty {
      <div class="booking-list__empty" role="status" aria-live="polite">
        <h3>No hay clases disponibles</h3>
        <p>Volvé a intentar más tarde.</p>
      </div>
    }
  </div>
</section>
